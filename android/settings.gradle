pluginManagement {
    def flutterSdkPath = {
        def properties = new Properties()
        File propertiesFile = file("local.properties")
        if (propertiesFile.exists()) {
            propertiesFile.withInputStream { properties.load(it) }
        }
        def sdkPath = properties.getProperty("flutter.sdk")
        if (sdkPath == null) sdkPath = System.getenv("FLUTTER_ROOT")
        if (sdkPath == null) sdkPath = System.getenv("FLUTTER_HOME")
        
        if (sdkPath == null) {
            throw new GradleException("Flutter SDK path not found. Define 'flutter.sdk' in local.properties or set FLUTTER_ROOT environment variable.")
        }
        return sdkPath
    }()

    includeBuild("$flutterSdkPath/packages/flutter_tools/gradle")

    repositories {
        google()
        mavenCentral()
        gradlePluginPortal()
    }
}

plugins {
    id "dev.flutter.flutter-gradle-plugin" apply false
    id "com.android.application" version "8.1.0" apply false
    id "org.jetbrains.kotlin.android" version "1.8.22" apply false
}

include ":app"
