name: J.A.R.V.I.S. Android Build

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.6'
          channel: 'stable'
          cache: true

      - name: Build APK (Definitive Clean-Slate)
        id: build_apk
        run: |
          set -o pipefail
          set -x
          
          # 1. PURGE AND REGENERATE
          if [ -d "android" ]; then rm -rf android; fi
          flutter create --platforms=android --org com.jarvis --project-name iamandroidjvs .
          # Force Groovy or Kotlin? Actually, let's just patch whatever exists.
          sleep 3
          
          # 2. RESOLVE DEPENDENCIES
          flutter pub get
          
          # 3. SURGICAL PATCH - Manifest, Local Properties & MinSDK
          # Path whatever exists in android/app/ (Groovy or Kotlin DSL)
          GRADLE_GROOVY="android/app/build.gradle"
          GRADLE_KOTLIN="android/app/build.gradle.kts"
          
          # Patch Manifest
          MANIFEST="android/app/src/main/AndroidManifest.xml"
          sed -i '/<uses-permission/d' $MANIFEST
          sed -i '/<manifest/a \    <uses-permission android:name="android.permission.RECORD_AUDIO" />\n    <uses-permission android:name="android.permission.INTERNET" />\n    <uses-permission android:name="android.permission.CAMERA" />' $MANIFEST
          sed -i 's/android:label="iamandroidjvs"/android:label="J.A.R.V.I.S."/' $MANIFEST
          
          # Patch Groovy if it exists
          if [ -f "$GRADLE_GROOVY" ]; then
            sed -i 's/minSdkVersion .*/minSdkVersion 21/' "$GRADLE_GROOVY"
            sed -i 's/targetSdkVersion .*/targetSdkVersion 34/' "$GRADLE_GROOVY"
            sed -i 's/compileSdkVersion .*/compileSdkVersion 34/' "$GRADLE_GROOVY"
          fi
          
          # Patch Kotlin DSL if it exists (KOTLIN DSL uses 'minSdk = 21')
          if [ -f "$GRADLE_KOTLIN" ]; then
            sed -i 's/minSdk = .*/minSdk = 21/' "$GRADLE_KOTLIN"
            sed -i 's/targetSdk = .*/targetSdk = 34/' "$GRADLE_KOTLIN"
            sed -i 's/compileSdk = .*/compileSdk = 34/' "$GRADLE_KOTLIN"
          fi
          
          # Ensure local properties see the explicit SDK
          echo "flutter.minSdkVersion=21" >> android/local.properties
          echo "flutter.targetSdkVersion=34" >> android/local.properties
          echo "flutter.compileSdkVersion=34" >> android/local.properties
          echo "flutter.sdk=$FLUTTER_ROOT" >> android/local.properties

          # CLEAN AGAIN TO ENSURE GRADLE SEES THE CHANGES
          flutter clean
          
          # Verify final result!
          echo "DEBUG: VERIFYING android/app files:"
          ls -R android/app/*.gradle*
          grep -i "Sdk" android/app/*.gradle* || echo "Sdk NOT FOUND"

          # 4. BUILD
          flutter build apk --release --verbose --obfuscate --split-debug-info=build/app/outputs/symbols | tee -a build_logs.txt
          BUILD_STATUS=${PIPESTATUS[0]}
          
          # 5. CAPTURE
          if [ $BUILD_STATUS -eq 0 ]; then
             cp build/app/outputs/flutter-apk/app-release.apk ./app-release.apk
          else
             echo "BUILD_FAILED=true" >> $GITHUB_ENV
             exit $BUILD_STATUS
          fi

      - name: Publish Logs to Git Branch
        if: always()
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -b debug/build-logs || git checkout debug/build-logs
          cp build_logs.txt build_logs.txt || echo "No logs"
          git add build_logs.txt
          git commit -m "debug: build logs Run #48 $(date)" || echo "No changes"
          git push origin debug/build-logs --force

      - name: Upload APK on Success
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: jarvis-android-release
          path: app-release.apk
