name: J.A.R.V.I.S. Android Build

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Flutter SDK
        uses: subosito/flutter-action@v2
        with:
          flutter-version: 3.10.0
          channel: stable
      - name: Build APK (SDK Heart Strike Victory)
        id: build_apk
        run: |
          set -o pipefail
          set -x
          
          # 1. PURGE AND REGENERATE
          if [ -d "android" ]; then rm -rf android; fi
          flutter create --platforms=android --org com.jarvis --project-name iamandroidjvs .
          sleep 3
          
          # 2. STRIKE AT THE HEART (Patch the Flutter SDK source)
          # We recursively replace 16 with 21 in the entire tool source
          find $FLUTTER_ROOT/packages/flutter_tools -type f -exec sed -i 's/minSdkVersion 16/minSdkVersion 21/g' {} + 2>/dev/null || true
          find $FLUTTER_ROOT/packages/flutter_tools -type f -exec sed -i 's/minSdkVersion: 16/minSdkVersion: 21/g' {} + 2>/dev/null || true
          
          # 3. RECOMPILE THE TOOL
          rm -f $FLUTTER_ROOT/bin/cache/flutter_tools.snapshot
          flutter --version # Triggers recompile
          
          # 4. RESOLVE
          flutter pub get
          
          # 5. PROJECT PATCH (The standard)
          find android/ -type f \( -name "*.gradle" -o -name "*.kts" \) -exec sed -i 's/minSdkVersion [0-9]*/minSdkVersion 21/g' {} +
          
          # 6. BUILD
          flutter build apk --release --verbose | tee build_logs.txt
          BUILD_STATUS=${PIPESTATUS[0]}
          
          # 7. CAPTURE
          if [ $BUILD_STATUS -eq 0 ]; then
             cp build/app/outputs/flutter-apk/app-release.apk ./app-release.apk
          else
             echo "BUILD_FAILED=true" >> $GITHUB_ENV
             exit $BUILD_STATUS
          fi

      - name: Publish Logs to Git Branch
        if: always()
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -b debug/build-logs || git checkout debug/build-logs
          cp build_logs.txt build_logs.txt || echo "No logs"
          git add build_logs.txt
          git commit -m "debug: build logs Run #76 $(date)" || echo "No changes"
          git push origin debug/build-logs --force

      - name: Create GitHub Release
        if: success()
        uses: softprops/action-gh-release@v1
        with:
          files: app-release.apk
          tag_name: v1.0.${{ github.run_number }}
          name: J.A.R.V.I.S. Android Release ${{ github.run_number }}
          body: |
            🎉 **J.A.R.V.I.S. Android APK is READY!** 🎙️🛰️
            
            This release contains the successfully built Android APK with:
            - **Flutter SDK "Heart Strike" Patch**
            - **`minSdkVersion 21`** Support
            - **Platform Parity** with the iOS version
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload APK on Success
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: jarvis-android-release
          path: app-release.apk
