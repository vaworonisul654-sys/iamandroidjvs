name: J.A.R.V.I.S. Android Build

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          # Upgrade to 3.22.0 and fix templates manually
          flutter-version: 3.22.0
          channel: stable
          cache: true

      - name: Prepare Android Build
        run: |
          flutter clean
          flutter pub get

      - name: Build APK (Standard Template Enforcement)
        id: build_apk
        run: |
          set -o pipefail
          set -x
          
          # 1. PURGE AND REGENERATE
          if [ -d "android" ]; then rm -rf android; fi
          flutter create --platforms=android --org com.jarvis --project-name iamandroidjvs .
          sleep 3
          
          # 2. OVERWRITE WITH VERIFIED STANDARD GROOVY
          cat > android/app/build.gradle <<EOF
          plugins {
              id "com.android.application"
              id "kotlin-android"
              id "dev.flutter.flutter-gradle-plugin"
          }
          
          android {
              namespace "com.jarvis.iamandroidjvs"
              compileSdk 34
          
              compileOptions {
                  sourceCompatibility JavaVersion.VERSION_1_8
                  targetCompatibility JavaVersion.VERSION_1_8
              }
          
              kotlinOptions {
                  jvmTarget = "1.8"
              }
          
              defaultConfig {
                  applicationId "com.jarvis.iamandroidjvs"
                  minSdk 21
                  targetSdk 34
                  versionCode flutterVersionCode.toInteger()
                  versionName flutterVersionName
              }
          
              buildTypes {
                  release {
                      signingConfig signingConfigs.debug
                  }
              }
          }
          
          flutter {
              source '../..'
          }
          EOF
          
          # 3. PATCH MANIFEST
          MANIFEST="android/app/src/main/AndroidManifest.xml"
          sed -i '/<uses-permission/d' $MANIFEST
          sed -i '/<manifest/a \    <uses-permission android:name="android.permission.RECORD_AUDIO" />\n    <uses-permission android:name="android.permission.INTERNET" />\n    <uses-permission android:name="android.permission.CAMERA" />' $MANIFEST
          sed -i 's/android:label="iamandroidjvs"/android:label="J.A.R.V.I.S."/' $MANIFEST
          
          # 4. RESOLVE DEPENDENCIES
          flutter pub get
          
          # 5. BUILD
          flutter build apk --release --verbose --obfuscate --split-debug-info=build/app/outputs/symbols | tee build_logs.txt
          BUILD_STATUS=${PIPESTATUS[0]}
          
          # 6. CAPTURE
          if [ $BUILD_STATUS -eq 0 ]; then
             cp build/app/outputs/flutter-apk/app-release.apk ./app-release.apk
          else
             echo "BUILD_FAILED=true" >> $GITHUB_ENV
             exit $BUILD_STATUS
          fi

      - name: Publish Logs to Git Branch
        if: always()
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -b debug/build-logs || git checkout debug/build-logs
          cp build_logs.txt build_logs.txt || echo "No logs"
          git add build_logs.txt
          git commit -m "debug: build logs Run #57 $(date)" || echo "No changes"
          git push origin debug/build-logs --force

      - name: Upload APK on Success
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: jarvis-android-release
          path: app-release.apk
