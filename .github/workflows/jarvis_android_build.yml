name: J.A.R.V.I.S. Android Build

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          # Upgrade to 3.22.0 and fix templates manually
          flutter-version: 3.22.0
          channel: stable
          cache: true

      - name: Prepare Android Build
        run: |
          flutter clean
          flutter pub get

      - name: Build APK (Plugin Pubspec Strike)
        id: build_apk
        run: |
          set -o pipefail
          set -x
          
          # 1. PURGE AND REGENERATE
          if [ -d "android" ]; then rm -rf android; fi
          flutter create --platforms=android --org com.jarvis --project-name iamandroidjvs .
          sleep 3
          
          # 2. DOWNLOAD PLUGIN SOURCE
          git clone --depth 1 --filter=blob:none --sparse https://github.com/flutter/packages.git flutter_packages
          cd flutter_packages
          git sparse-checkout set packages/camera/camera_android
          cd ..
          
          # 3. PATCH PLUGIN SOURCE (GRADLE + PUBSPEC)
          # Some newer plugins store minSdkVersion in pubspec.yaml too
          find flutter_packages/ -name "*.gradle" -exec sed -i 's/minSdkVersion 16/minSdkVersion 21/g' {} + 2>/dev/null || true
          find flutter_packages/ -name "pubspec.yaml" -exec sed -i 's/minSdkVersion: [0-9]*/minSdkVersion: 21/g' {} + 2>/dev/null || true
          
          # 4. INJECT LOCAL PATH
          sed -i 's/camera: .*/camera:\n    path: .\/flutter_packages\/packages\/camera\/camera_android/g' pubspec.yaml
          
          # 5. DUAL SYNTAX PROJECT PATCH
          find android/ -type f \( -name "*.gradle" -o -name "*.kts" \) -exec sed -i 's/minSdkVersion[[:space:]]\+[0-9]\+/minSdkVersion 21/g' {} +
          find android/ -type f \( -name "*.gradle" -o -name "*.kts" \) -exec sed -i 's/minSdk[[:space:]]\+[0-9]\+/minSdk 21/g' {} +
          
          # 6. RESOLVE AND BUILD
          flutter pub get
          flutter build apk --release --verbose --obfuscate --split-debug-info=build/app/outputs/symbols | tee build_logs.txt
          BUILD_STATUS=${PIPESTATUS[0]}
          
          # 7. CAPTURE
          if [ $BUILD_STATUS -eq 0 ]; then
             cp build/app/outputs/flutter-apk/app-release.apk ./app-release.apk
          else
             echo "BUILD_FAILED=true" >> $GITHUB_ENV
             exit $BUILD_STATUS
          fi

      - name: Publish Logs to Git Branch
        if: always()
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -b debug/build-logs || git checkout debug/build-logs
          cp build_logs.txt build_logs.txt || echo "No logs"
          git add build_logs.txt
          git commit -m "debug: build logs Run #72 $(date)" || echo "No changes"
          git push origin debug/build-logs --force

      - name: Upload APK on Success
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: jarvis-android-release
          path: app-release.apk
