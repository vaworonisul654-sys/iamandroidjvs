name: J.A.R.V.I.S. Android Build

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          # Upgrade to 3.22.0 and fix templates manually
          flutter-version: 3.22.0
          channel: stable
          cache: true

      - name: Prepare Android Build
        run: |
          flutter clean
          flutter pub get

      - name: Build APK (Forward Fix 3.22.0)
        id: build_apk
        run: |
          set -o pipefail
          set -x
          
          # 1. PURGE AND REGENERATE (Surgical)
          if [ -d "android" ]; then rm -rf android; fi
          flutter create --platforms=android --org com.jarvis --project-name iamandroidjvs .
          sleep 3
          
          # 2. SURGICAL REPAIR (Fix 3.22.0 template errors)
          MAIN_ACTIVITY="android/app/src/main/kotlin/com/jarvis/iamandroidjvs/MainActivity.kt"
          # Inject missing IO and FlutterActivity imports if they are absent
          sed -i 's/import io.flutter.embedding.android.FlutterActivity//g' $MAIN_ACTIVITY
          sed -i '/package /a import io.flutter.embedding.android.FlutterActivity' $MAIN_ACTIVITY
          
          # 3. MINSDK PATCH (Robust)
          GRADLE_KOTLIN="android/app/build.gradle.kts"
          GRADLE_GROOVY="android/app/build.gradle"
          if [ -f "$GRADLE_KOTLIN" ]; then
             sed -i 's/minSdk = .*/minSdk = 21/' $GRADLE_KOTLIN
          fi
          if [ -f "$GRADLE_GROOVY" ]; then
             sed -i 's/minSdkVersion .*/minSdkVersion 21/' $GRADLE_GROOVY
          fi
          
          # 4. RESOLVE DEPENDENCIES
          flutter pub get
          
          # 5. BUILD
          flutter build apk --release --verbose --obfuscate --split-debug-info=build/app/outputs/symbols | tee build_logs.txt
          BUILD_STATUS=${PIPESTATUS[0]}
          
          # 6. CAPTURE
          if [ $BUILD_STATUS -eq 0 ]; then
             cp build/app/outputs/flutter-apk/app-release.apk ./app-release.apk
          else
             echo "BUILD_FAILED=true" >> $GITHUB_ENV
             exit $BUILD_STATUS
          fi

      - name: Publish Logs to Git Branch
        if: always()
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -b debug/build-logs || git checkout debug/build-logs
          cp build_logs.txt build_logs.txt || echo "No logs"
          git add build_logs.txt
          git commit -m "debug: build logs Run #50 $(date)" || echo "No changes"
          git push origin debug/build-logs --force

      - name: Upload APK on Success
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: jarvis-android-release
          path: app-release.apk
