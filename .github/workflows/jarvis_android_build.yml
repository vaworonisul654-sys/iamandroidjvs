name: J.A.R.V.I.S. Android Build

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Flutter SDK
        uses: subosito/flutter-action@v2
        with:
          flutter-version: 3.24.5
          channel: stable
          cache: true

      - name: Build APK (Total Nuclear Victory)
        id: build_apk
        run: |
          set -o pipefail
          set -x
          
          # 1. PURGE AND REGENERATE
          if [ -d "android" ]; then rm -rf android; fi
          flutter create --platforms=android --org com.jarvis --project-name jarvis_android .
          sleep 3
          
          # 2. RESOLVE
          flutter pub get
          
          # 3. TOTAL NUCLEAR BUILD GRADLE (No variables)
          cat > android/app/build.gradle <<EOF
          plugins {
              id "com.android.application"
              id "kotlin-android"
              id "dev.flutter.flutter-gradle-plugin"
          }
          android {
              namespace "com.jarvis.jarvis_android"
              compileSdk 34
              ndkVersion "25.1.8937393"
              compileOptions {
                  sourceCompatibility JavaVersion.VERSION_17
                  targetCompatibility JavaVersion.VERSION_17
              }
              kotlinOptions {
                  jvmTarget = '17'
              }
              defaultConfig {
                  applicationId "com.jarvis.jarvis_android"
                  minSdk 21
                  targetSdk 34
                  versionCode 1
                  versionName "1.0.0"
              }
              buildTypes {
                  release {
                      signingConfig signingConfigs.debug
                      minifyEnabled true
                      proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
                  }
              }
          }
          flutter {
              source '../..'
          }
          EOF
          
          # 4. BUILD
          flutter build apk --release --verbose | tee build_logs.txt
          BUILD_STATUS=${PIPESTATUS[0]}
          
          # 5. CAPTURE
          if [ $BUILD_STATUS -eq 0 ]; then
             cp build/app/outputs/flutter-apk/app-release.apk ./app-release.apk
          else
             echo "BUILD_FAILED=true" >> $GITHUB_ENV
             exit $BUILD_STATUS
          fi

      - name: Publish Logs to Git Branch
        if: always()
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -b debug/build-logs || git checkout debug/build-logs
          cp build_logs.txt build_logs.txt || echo "No logs"
          git add build_logs.txt
          git commit -m "debug: build logs Run #76 $(date)" || echo "No changes"
          git push origin debug/build-logs --force

      - name: Create GitHub Release
        if: success()
        uses: softprops/action-gh-release@v1
        with:
          files: app-release.apk
          tag_name: v1.0.${{ github.run_number }}
          name: J.A.R.V.I.S. Android Release ${{ github.run_number }}
          body: |
            🎉 **J.A.R.V.I.S. Android APK is READY!** 🎙️🛰️
            
            This release contains the successfully built Android APK with:
            - **Flutter 3.24.5 (Latest Stable)**
            - **Modern Plugins** (^0.11.0 camera)
            - **`minSdkVersion 21`** Support
            - **Platform Parity** with the iOS version
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload APK on Success
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: jarvis-android-release
          path: app-release.apk
