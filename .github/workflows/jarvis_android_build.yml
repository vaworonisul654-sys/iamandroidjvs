name: J.A.R.V.I.S. Android Build

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Flutter SDK
        uses: subosito/flutter-action@v2
        with:
          flutter-version: 3.24.5
          channel: stable
          cache: true

      - name: Prepare Android Build
        run: |
          flutter clean
          flutter pub get

      - name: Build APK (Stable Nexus Victory)
        id: build_apk
        run: |
          set -o pipefail
          set -x
          
          # 1. PURGE AND REGENERATE
          if [ -d "android" ]; then rm -rf android; fi
          flutter create --platforms=android --org com.jarvis --project-name iamandroidjvs .
          sleep 3
          
          # 2. RESOLVE
          flutter pub get
          
          # 3. HOME ROOT TOTAL WAR (Patch every gradle file in $HOME)
          # This catches plugins, templates, and cached configs
          find $HOME -name "*.gradle" -exec sed -i 's/minSdkVersion [0-9]*/minSdkVersion 21/g' {} + 2>/dev/null || true
          
          # 4. PROJECT DUAL SYNTAX PATCH
          find android/ -type f \( -name "*.gradle" -o -name "*.kts" \) -exec sed -i 's/minSdkVersion[[:space:]]\+[0-9]\+/minSdkVersion 21/g' {} +
          find android/ -type f \( -name "*.gradle" -o -name "*.kts" \) -exec sed -i 's/minSdk[[:space:]]\+[0-9]\+/minSdk 21/g' {} +
          
          # 5. BUILD
          flutter build apk --release --verbose --obfuscate --split-debug-info=build/app/outputs/symbols | tee build_logs.txt
          BUILD_STATUS=${PIPESTATUS[0]}
          
          # 6. CAPTURE
          if [ $BUILD_STATUS -eq 0 ]; then
             cp build/app/outputs/flutter-apk/app-release.apk ./app-release.apk
          else
             echo "BUILD_FAILED=true" >> $GITHUB_ENV
             exit $BUILD_STATUS
          fi

      - name: Publish Logs to Git Branch
        if: always()
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -b debug/build-logs || git checkout debug/build-logs
          cp build_logs.txt build_logs.txt || echo "No logs"
          git add build_logs.txt
          git commit -m "debug: build logs Run #76 $(date)" || echo "No changes"
          git push origin debug/build-logs --force

      - name: Create GitHub Release
        if: success()
        uses: softprops/action-gh-release@v1
        with:
          files: app-release.apk
          tag_name: v1.0.${{ github.run_number }}
          name: J.A.R.V.I.S. Android Release ${{ github.run_number }}
          body: |
            🎉 **J.A.R.V.I.S. Android APK is READY!** 🎙️🛰️
            
            This release contains the successfully built Android APK with:
            - **`minSdkVersion 21`** Support (Camera/Gallery parity)
            - **Platform Parity** with the iOS version
            - **Premium Design** (Outfit font, Emerald/Navy theme)
            
            Download the `app-release.apk` below! 🚀
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload APK on Success
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: jarvis-android-release
          path: app-release.apk
