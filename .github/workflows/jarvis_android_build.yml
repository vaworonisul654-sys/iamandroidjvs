name: J.A.R.V.I.S. Android Build

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Flutter SDK
        uses: subosito/flutter-action@v2
        with:
          flutter-version: 3.24.5
          channel: stable
          cache: true

      - name: Build APK (Kotlin Lock Victory)
        id: build_apk
        run: |
          set -o pipefail
          set -x
          
          # 1. PURGE AND REGENERATE
          if [ -d "android" ]; then rm -rf android; fi
          flutter create --platforms=android --org com.jarvis --project-name jarvis_android .
          sleep 3
          
          # 2. UPGRADE PUBSPEC FOR MODERN SYNC
          sed -i 's/camera: .*/camera: ^0.11.0/g' pubspec.yaml
          sed -i 's/image_picker: .*/image_picker: ^1.1.2/g' pubspec.yaml
          
          # 3. RESOLVE
          flutter pub get
          
          # 4. KOTLIN LOCK IN BUILD.GRADLE (The real fix)
          # We force Kotlin 1.9.10 which is needed for modern Flutter 3.24 plugins
          sed -i "s/ext.kotlin_version = .*/ext.kotlin_version = '1.9.10'/g" android/build.gradle
          
          # 5. PROJECT PATCH (Literal 21)
          find android/ -type f \( -name "*.gradle" -o -name "*.kts" \) -exec sed -i 's/minSdkVersion [0-9]*/minSdkVersion 21/g' {} +
          find android/ -type f \( -name "*.gradle" -o -name "*.kts" \) -exec sed -i 's/minSdk [0-9]*/minSdk 21/g' {} +
          
          # 6. BUILD
          flutter build apk --release --verbose | tee build_logs.txt
          BUILD_STATUS=${PIPESTATUS[0]}
          
          # 7. CAPTURE
          if [ $BUILD_STATUS -eq 0 ]; then
             cp build/app/outputs/flutter-apk/app-release.apk ./app-release.apk
          else
             echo "BUILD_FAILED=true" >> $GITHUB_ENV
             exit $BUILD_STATUS
          fi

      - name: Publish Logs to Git Branch
        if: always()
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -b debug/build-logs || git checkout debug/build-logs
          cp build_logs.txt build_logs.txt || echo "No logs"
          git add build_logs.txt
          git commit -m "debug: build logs Run #76 $(date)" || echo "No changes"
          git push origin debug/build-logs --force

      - name: Create GitHub Release
        if: success()
        uses: softprops/action-gh-release@v1
        with:
          files: app-release.apk
          tag_name: v1.0.${{ github.run_number }}
          name: J.A.R.V.I.S. Android Release ${{ github.run_number }}
          body: |
            🎉 **J.A.R.V.I.S. Android APK is READY!** 🎙️🛰️
            
            This release contains the successfully built Android APK with:
            - **Flutter 3.24.5 (Latest Stable)**
            - **Modern Plugins** (^0.11.0 camera)
            - **`minSdkVersion 21`** Support
            - **Platform Parity** with the iOS version
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload APK on Success
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: jarvis-android-release
          path: app-release.apk
