name: J.A.R.V.I.S. Android Build

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          # Upgrade to 3.22.0 and fix templates manually
          flutter-version: 3.22.0
          channel: stable
          cache: true

      - name: Prepare Android Build
        run: |
          flutter clean
          flutter pub get

      - name: Build APK (Groovy-Only Hardcoded)
        id: build_apk
        run: |
          set -o pipefail
          set -x
          
          # 1. PURGE AND REGENERATE
          if [ -d "android" ]; then rm -rf android; fi
          flutter create --platforms=android --org com.jarvis --project-name iamandroidjvs .
          sleep 3
          
          # 2. PURGE KOTLIN DSL (The source of confusion)
          find android/ -name "*.kts" -delete
          
          # 3. OVERWRITE WITH HARDCODED GROOVY (Verified Template)
          GRADLE="android/app/build.gradle"
          # We need to recreate it if it doesn't exist or was .kts only
          # Actually, I'll just use sed on the generated one if it's there
          if [ ! -f "$GRADLE" ]; then
             # Re-run create with --template=app? No, let's just create a basic one
             flutter create --platforms=android --org com.jarvis --project-name iamandroidjvs .
          fi
          
          # PATCH GROOVY AGGRESSIVELY
          sed -i 's/minSdkVersion .*/minSdkVersion 21/' $GRADLE
          sed -i 's/targetSdkVersion .*/targetSdkVersion 34/' $GRADLE
          sed -i 's/compileSdkVersion .*/compileSdkVersion 34/' $GRADLE
          
          # 4. PATCH MANIFEST
          MANIFEST="android/app/src/main/AndroidManifest.xml"
          sed -i '/<uses-permission/d' $MANIFEST
          sed -i '/<manifest/a \    <uses-permission android:name="android.permission.RECORD_AUDIO" />\n    <uses-permission android:name="android.permission.INTERNET" />\n    <uses-permission android:name="android.permission.CAMERA" />' $MANIFEST
          sed -i 's/android:label="iamandroidjvs"/android:label="J.A.R.V.I.S."/' $MANIFEST
          
          # 5. RESOLVE DEPENDENCIES
          flutter pub get
          
          # 6. BUILD
          flutter build apk --release --verbose --obfuscate --split-debug-info=build/app/outputs/symbols | tee build_logs.txt
          BUILD_STATUS=${PIPESTATUS[0]}
          
          # 7. CAPTURE
          if [ $BUILD_STATUS -eq 0 ]; then
             cp build/app/outputs/flutter-apk/app-release.apk ./app-release.apk
          else
             echo "BUILD_FAILED=true" >> $GITHUB_ENV
             exit $BUILD_STATUS
          fi

      - name: Publish Logs to Git Branch
        if: always()
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -b debug/build-logs || git checkout debug/build-logs
          cp build_logs.txt build_logs.txt || echo "No logs"
          git add build_logs.txt
          git commit -m "debug: build logs Run #52 $(date)" || echo "No changes"
          git push origin debug/build-logs --force

      - name: Upload APK on Success
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: jarvis-android-release
          path: app-release.apk
