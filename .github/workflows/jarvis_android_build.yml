name: J.A.R.V.I.S. Android Build

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0'
          channel: 'stable'

      - name: System Diagnostics
        run: |
          flutter doctor -v
          ls -la
          
      - name: Surgical Android Platform Restoration
        run: |
          # Back up modernized scripts
          cp android/settings.gradle settings.gradle.bak
          cp android/app/build.gradle build.gradle.bak
          
          # Restore missing files
          flutter create --platforms=android .
          
          # Restore optimized scripts
          mv settings.gradle.bak android/settings.gradle
          mv build.gradle.bak android/app/build.gradle
          
          chmod +x android/gradlew

      - name: Prepare Android Build
        run: |
          echo "flutter.sdk=$FLUTTER_ROOT" > android/local.properties
          
          if [ ! -f android/app/debug.keystore ]; then
            keytool -genkey -v -keystore android/app/debug.keystore \
              -storepass android -alias androiddebugkey -keypass android -keyalg RSA -keysize 2048 \
              -validity 10000 -dname "CN=Android Debug,O=Android,C=US" -noprompt
          fi
          
          flutter clean
          flutter pub get

      - name: Build APK (SDK Native)
        id: build_apk
        run: |
          # Use tee to see real-time console progress while capturing build_logs.txt
          flutter build apk --release --verbose --obfuscate --split-debug-info=build/app/outputs/symbols | tee build_logs.txt

      - name: Publish Logs to Git Branch
        if: failure() || success()
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -b debug/build-logs || git checkout debug/build-logs
          cp build_logs.txt build_logs.txt || echo "No logs to copy"
          git add build_logs.txt || echo "Nothing to add"
          git commit -m "debug: SDK-native build logs run #27 $(date)" || echo "Nothing to commit"
          git push origin debug/build-logs --force

      - name: Upload Logs on Failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs
          path: build_logs.txt

      - name: Upload APK on Success
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: jarvis-android-release
          path: "**/app-release.apk"
