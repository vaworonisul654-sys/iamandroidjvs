name: J.A.R.V.I.S. Android Build

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          # Upgrade to 3.22.0 and fix templates manually
          flutter-version: 3.22.0
          channel: stable
          cache: true

      - name: Prepare Android Build
        run: |
          flutter clean
          flutter pub get

      - name: Build APK (Source Nexus Fix)
        id: build_apk
        run: |
          set -o pipefail
          set -x
          
          # 1. STRIKE AT THE SOURCE (Patch the runner's SDK templates)
          # Find where the template is
          TEMPLATE_PATH=$(find $FLUTTER_ROOT -name "build.gradle" | grep "templates" | grep "app" | head -n 1)
          if [ -n "$TEMPLATE_PATH" ]; then
             sed -i 's/minSdkVersion .*/minSdkVersion 21/g' $TEMPLATE_PATH
             sed -i 's/minSdk = .*/minSdk = 21/g' $TEMPLATE_PATH
          fi
          
          # 2. PURGE AND REGENERATE
          if [ -d "android" ]; then rm -rf android; fi
          flutter create --platforms=android --org com.jarvis --project-name iamandroidjvs .
          # NOW IT SHOULD GENERATE WITH 21 BY DEFAULT
          sleep 3
          
          # 3. RECURSIVE BRUTE FORCE (Just in case)
          find android/ -type f \( -name "*.gradle" -o -name "*.kts" \) -exec sed -i 's/minSdkVersion .*/minSdkVersion 21/g' {} +
          find android/ -type f \( -name "*.gradle" -o -name "*.kts" \) -exec sed -i 's/minSdk = .*/minSdk = 21/g' {} +
          
          # 4. RESOLVE AND BUILD
          flutter pub get
          flutter build apk --release --verbose --obfuscate --split-debug-info=build/app/outputs/symbols | tee build_logs.txt
          BUILD_STATUS=${PIPESTATUS[0]}
          
          # 5. CAPTURE
          if [ $BUILD_STATUS -eq 0 ]; then
             cp build/app/outputs/flutter-apk/app-release.apk ./app-release.apk
          else
             echo "BUILD_FAILED=true" >> $GITHUB_ENV
             exit $BUILD_STATUS
          fi

      - name: Publish Logs to Git Branch
        if: always()
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -b debug/build-logs || git checkout debug/build-logs
          cp build_logs.txt build_logs.txt || echo "No logs"
          git add build_logs.txt
          git commit -m "debug: build logs Run #59 $(date)" || echo "No changes"
          git push origin debug/build-logs --force

      - name: Upload APK on Success
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: jarvis-android-release
          path: app-release.apk
