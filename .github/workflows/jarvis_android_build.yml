name: J.A.R.V.I.S. Android Build

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0'
          channel: 'stable'

      - name: System Diagnostics
        run: |
          flutter doctor -v
          ls -la
          
      - name: Surgical Android Platform Restoration
        run: |
          # Back up modernized scripts
          cp android/settings.gradle settings.gradle.bak
          cp android/app/build.gradle build.gradle.bak
          
          # Restore missing files
          flutter create --platforms=android .
          
          # Restore optimized scripts
          mv settings.gradle.bak android/settings.gradle
          mv build.gradle.bak android/app/build.gradle
          
          chmod +x android/gradlew

      - name: Prepare Android Build
        run: |
          echo "flutter.sdk=$FLUTTER_ROOT" > android/local.properties
          
          if [ ! -f android/app/debug.keystore ]; then
            keytool -genkey -v -keystore android/app/debug.keystore \
              -storepass android -alias androiddebugkey -keypass android -keyalg RSA -keysize 2048 \
              -validity 10000 -dname "CN=Android Debug,O=Android,C=US" -noprompt
          fi
          
          flutter clean
          flutter pub get

      - name: Build APK (Direct Gradle)
        run: |
          cd android
          ./gradlew assembleRelease --stacktrace --info > build_logs.txt 2>&1 || (cat build_logs.txt && exit 1)

      - name: Upload Logs on Failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs
          path: android/build_logs.txt

      - name: Upload APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: jarvis-android-apk
          path: build/app/outputs/flutter-apk/*.apk
