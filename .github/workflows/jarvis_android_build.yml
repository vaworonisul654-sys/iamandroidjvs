name: J.A.R.V.I.S. Android Build

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0'
          channel: 'stable'

      - name: System Diagnostics
        run: |
          flutter doctor -v
          ls -la
          
      - name: Surgical Android Platform Restoration
        run: |
          # Back up modernized scripts
          cp android/settings.gradle settings.gradle.bak
          cp android/app/build.gradle build.gradle.bak
          
          # Restore missing files
          flutter create --platforms=android .
          
          # Restore optimized scripts
          mv settings.gradle.bak android/settings.gradle
          mv build.gradle.bak android/app/build.gradle
          
          chmod +x android/gradlew

      - name: Prepare Android Build
        run: |
          echo "flutter.sdk=$FLUTTER_ROOT" > android/local.properties
          
          if [ ! -f android/app/debug.keystore ]; then
            keytool -genkey -v -keystore android/app/debug.keystore \
              -storepass android -alias androiddebugkey -keypass android -keyalg RSA -keysize 2048 \
              -validity 10000 -dname "CN=Android Debug,O=Android,C=US" -noprompt
          fi
          
          flutter clean
          flutter pub get

      - name: Build APK (Clean Slate)
        id: build_apk
        run: |
          set -x
          # 1. PURGE AND REGENERATE
          if [ -d "android" ]; then rm -rf android; fi
          flutter create --platforms=android --org com.jarvis --project-name iamandroidjvs .
          
          # 2. VERIFY REGENERATION
          if [ ! -f "android/app/src/main/AndroidManifest.xml" ]; then
            echo "Regeneration failed! No manifest found."
            exit 1
          fi
          
          # 3. SURGICAL PATCH - Manifest Permissions & Label
          # Use absolute paths and verify each step
          MANIFEST="android/app/src/main/AndroidManifest.xml"
          sed -i '/<uses-permission/d' $MANIFEST
          sed -i '/<manifest/a \    <uses-permission android:name="android.permission.RECORD_AUDIO" />\n    <uses-permission android:name="android.permission.INTERNET" />\n    <uses-permission android:name="android.permission.CAMERA" />' $MANIFEST
          sed -i 's/android:label="iamandroidjvs"/android:label="J.A.R.V.I.S."/' $MANIFEST
          
          # 4. BUILD
          flutter build apk --release --verbose --obfuscate --split-debug-info=build/app/outputs/symbols
          
          # 5. CAPTURE
          # Use find as a fallback if the standard path shifts
          find build/app/outputs/flutter-apk -name "app-release.apk" -exec cp {} ./app-release.apk \;
          
          if [ ! -f "app-release.apk" ]; then
            echo "APK build failed! app-release.apk not found."
            exit 1
          fi

      - name: Upload APK on Success
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: jarvis-android-release
          path: app-release.apk
