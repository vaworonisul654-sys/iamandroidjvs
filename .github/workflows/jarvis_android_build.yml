name: J.A.R.V.I.S. Android Build

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0'
          channel: 'stable'

      - name: Surgical Android Platform Restoration
        run: |
          # Back up our modernized files
          cp android/settings.gradle settings.gradle.bak
          cp android/app/build.gradle build.gradle.bak
          
          # Re-generate platform files (this restores gradlew and wrapper)
          flutter create --platforms=android .
          
          # Restore our modernized files
          mv settings.gradle.bak android/settings.gradle
          mv build.gradle.bak android/app/build.gradle
          
          # Ensure gradlew is executable
          chmod +x android/gradlew

      - name: Prepare Android Build
        run: |
          echo "flutter.sdk=$FLUTTER_ROOT" > android/local.properties
          
          if [ ! -f android/app/debug.keystore ]; then
            keytool -genkey -v -keystore android/app/debug.keystore \
              -storepass android -alias androiddebugkey -keypass android -keyalg RSA -keysize 2048 \
              -validity 10000 -dname "CN=Android Debug,O=Android,C=US" -noprompt
          fi
          
          flutter clean
          flutter pub get

      - name: Build APK
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: flutter build apk --release -v --dart-define=GEMINI_API_KEY="$GEMINI_API_KEY" --dart-define=OPENAI_API_KEY="$OPENAI_API_KEY"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: jarvis-android-apk
          path: build/app/outputs/flutter-apk/*.apk
