name: Android APK Build

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0'
          channel: 'stable'

      - name: Prepare Android Build
        run: |
          echo "flutter.sdk=$FLUTTER_ROOT" > android/local.properties
          
          # Generate debug.keystore safely
          if [ ! -f android/app/debug.keystore ]; then
            keytool -genkey -v -keystore android/app/debug.keystore \
              -storepass android -alias androiddebugkey -keypass android -keyalg RSA -keysize 2048 \
              -validity 10000 -dname "CN=Android Debug,O=Android,C=US" -noprompt
          fi
          
          flutter clean
          flutter pub get
          # Skip analyze temporarily to isolate build errors
          # flutter analyze --no-fatal-infos

      - name: Build APK (VERBOSE)
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          flutter build apk --release --verbose \
            --dart-define=GEMINI_API_KEY=$GEMINI_API_KEY \
            --dart-define=OPENAI_API_KEY=$OPENAI_API_KEY

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: jarvis-android-apk
          path: build/app/outputs/flutter-apk/*.apk
